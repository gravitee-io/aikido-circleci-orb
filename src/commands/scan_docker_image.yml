description: >
  Scans a locally-available Docker image with the Aikido local scanner and
  uploads the results to the Aikido platform. Requires a running Docker daemon
  (use a machine executor). Optionally fails the build on issues at or above a
  given severity via --fail-on.

parameters:
  docker_image_to_scan:
    type: string
    default: ""
    description: >
      The local Docker image (name:tag) to scan, e.g. myapp:1.2.3. Leave empty
      and set built_docker_image_file to scan a list of images instead. Not
      required when dry_run is true.
  built_docker_image_file:
    type: string
    default: ""
    description: >
      Path to a file listing one Docker image (name:tag) per line to scan.
      Used only when docker_image_to_scan is empty. Each image is scanned in
      turn; the step fails on the first image that fails its scan.
  aikido_api_key:
    type: env_var_name
    default: AIKIDO_API_KEY
    description: >
      Name of the environment variable holding the Aikido CI API key
      (AIK_CI_xxx). Set it as a project/context env var, never inline. Not
      required when dry_run is true.
  dry_run:
    type: boolean
    default: false
    description: >
      When true, pulls the scanner image and runs it with --help instead of
      performing a real scan. Validates the Docker wiring (socket access,
      image pull, parameter plumbing) without needing a real API key. Useful
      for testing this orb's CI pipeline without exposing an Aikido API key
      to every project/PR that builds it.
  fail_on:
    type: enum
    enum: ["", "low", "medium", "high", "critical"]
    default: "critical"
    description: >
      Fail the build when issues at or above this severity are found.
      Set to an empty string to disable gating (report only).
  scanner_version:
    type: string
    default: "latest"
    description: "Tag of the aikidosecurity/local-scanner image to use."
  extra_args:
    type: string
    default: ""
    description: "Additional raw arguments passed through to the image-scan command."

steps:
  - when:
      condition: << parameters.dry_run >>
      steps:
        - run:
            name: Aikido Docker Image Scan (dry run)
            environment:
              PARAM_SCANNER_VERSION: << parameters.scanner_version >>
            command: <<include(scripts/scan_image_dry_run.sh)>>
  - unless:
      condition: << parameters.dry_run >>
      steps:
        - run:
            name: Aikido Docker Image Scan
            environment:
              PARAM_IMAGE: << parameters.docker_image_to_scan >>
              PARAM_IMAGE_FILE: << parameters.built_docker_image_file >>
              PARAM_API_KEY: << parameters.aikido_api_key >>
              PARAM_FAIL_ON: << parameters.fail_on >>
              PARAM_SCANNER_VERSION: << parameters.scanner_version >>
              PARAM_EXTRA_ARGS: << parameters.extra_args >>
            command: <<include(scripts/scan_image.sh)>>
