version: 2.1
setup: true
orbs:
  orb-tools: circleci/orb-tools@12.3
  shellcheck: circleci/shellcheck@3.2

filters: &filters
  tags:
    only: /.*/

# Branches only, no tags: keeps this dev publish from racing/shadowing the
# production publish that test-deploy.yml runs on release tags.
dev-filters: &dev-filters
  tags:
    ignore: /.*/

workflows:
  lint-pack:
    jobs:
      - orb-tools/lint:
          filters: *filters
      - orb-tools/pack:
          filters: *filters
      - orb-tools/review:
          orb_name: aikido
          filters: *filters
      - shellcheck/check:
          filters: *filters
      - orb-tools/publish:
          orb_name: gravitee-io/aikido
          vcs_type: << pipeline.project.type >>
          pub_type: dev
          requires:
            - orb-tools/lint
            - orb-tools/pack
            - orb-tools/review
            - shellcheck/check
          context: keeper-orb-publishing
          filters: *dev-filters
      - orb-tools/continue:
          pipeline_number: << pipeline.number >>
          vcs_type: << pipeline.project.type >>
          orb_name: aikido
          requires: [orb-tools/lint, orb-tools/pack, orb-tools/review, shellcheck/check]
          filters: *filters
